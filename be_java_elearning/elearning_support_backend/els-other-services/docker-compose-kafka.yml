version: '3.7'
networks:
  e_learning_support:
    name: elearning_support_network
    external: true
services:
  els_kafka_zookeeper_s1:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: els_kafka_zookeeper_s1
    restart: always
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - e_learning_support
    ports:
      - "22181:2181"
    expose:
      - 2181

  els_kafka_zookeeper_s2:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: els_kafka_zookeeper_s2
    restart: always
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - e_learning_support
    ports:
      - "32181:2181"
    expose:
      - 2181

  els_kafka_s1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: els_kafka_s1
    restart: always
    depends_on:
      - els_kafka_zookeeper_s1
      - els_kafka_zookeeper_s2
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=els_kafka_zookeeper_s1:2181,els_kafka_zookeeper_s2:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://els_kafka_s1:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_RETENTION_HOURS=24
    networks:
      - e_learning_support
    ports:
      - "29092:29092"
    expose:
      - 29092
      - 9092

  els_kafka_s2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: els_kafka_s2
    restart: always
    depends_on:
      - els_kafka_zookeeper_s1
      - els_kafka_zookeeper_s2
    environment:
      - KAFKA_BROKER_ID=2
      - KAFKA_ZOOKEEPER_CONNECT=els_kafka_zookeeper_s1:2181,els_kafka_zookeeper_s2:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://els_kafka_s2:9092,PLAINTEXT_HOST://localhost:39092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_RETENTION_HOURS=24
    networks:
      - e_learning_support
    ports:
      - "39092:39092"
    expose:
      - 39092
      - 9092


